statement_en: |
  Let u be a smooth divergence-free mean-zero solution of the 3D incompressible Navier-Stokes equations on T^3 with viscosity nu > 0 and zero force on [0,T).
  For 0 < r <= 1 and 0 < t0 < T, define the periodic parabolic cylinder Q_r(x0,t0) = B_r(x0) x (t0 - r^2, t0), with B_r interpreted on the periodic lift when needed.
  Let omega = curl u and define the localized enstrophy concentration E_r(x0,t0) = r^{-1} integral_{t0-r^2}^{t0} integral_{B_r(x0)} |omega(x,t)|^2 dx dt, so the scaling exponent is beta = 1.
  If sup_{x0,t0,r} E_r(x0,t0) is finite on [0,T), then u extends smoothly past time T.
