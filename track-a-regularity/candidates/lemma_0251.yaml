statement_en: |
  Let u be a smooth divergence-free mean-zero solution of the 3D incompressible Navier-Stokes equations on T^3 with viscosity nu > 0 and zero force on [0,T).
  Let P_{<=N} be a fixed smooth Littlewood-Paley low-frequency shell projector on T^3, let u_{<=N} = P_{<=N} u, and define Pi_N^LES(u)(t) = integral_{T^3} grad u_{<=N}(t) : (P_{<=N}(u tensor u)(t) - u_{<=N}(t) tensor u_{<=N}(t)) dx.
  If the positive flux envelope with normalization exponent alpha = 1 satisfies sum over dyadic N of N^{-alpha} integral_0^T max(Pi_N^LES(u)(t), 0) dt < infinity, then u extends smoothly past time T.
